name: Publish to npm

# Triggered when a GitHub Release is published.
# Workflow:
#   1. Create a tag vX.Y.Z on the commit you want to release
#   2. Go to GitHub → Releases → Draft a new release
#   3. Choose the tag, write the release notes, click "Publish release"
#   4. This workflow runs automatically and publishes to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read    # read the repo
      id-token: write   # required for npm provenance (--provenance flag)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # ── Validation ─────────────────────────────────────────────────────────

      - name: Validate version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.ref_name }}"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "ERROR: package.json version (${PACKAGE_VERSION}) does not match release tag (${RELEASE_TAG})"
            echo "Expected tag: ${EXPECTED_TAG}"
            exit 1
          fi
          echo "Version check passed: ${PACKAGE_VERSION}"

      # ── Build ───────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist
        run: node -e "const orion = require('./dist/index.js'); console.log('dist ok:', Object.keys(orion).length, 'symbols exported')"

      # ── Publish ─────────────────────────────────────────────────────────────

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
