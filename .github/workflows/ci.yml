name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts --max-warnings 600

      - name: Format check
        run: npx prettier --check "src/**/*.ts"

      - name: Build
        run: npm run build

      - name: Verify dist exports
        run: node -e "const orion = require('./dist/index.js'); console.log('exports ok:', Object.keys(orion).length, 'symbols')"
