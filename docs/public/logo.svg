<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" stroke="url(#grad)" stroke-width="6"/>
  <!-- Inner star / constellation shape -->
  <circle cx="50" cy="50" r="8" fill="url(#grad)"/>
  <circle cx="50" cy="18" r="5" fill="url(#grad)"/>
  <circle cx="76" cy="33" r="5" fill="url(#grad)"/>
  <circle cx="76" cy="67" r="5" fill="url(#grad)"/>
  <circle cx="50" cy="82" r="5" fill="url(#grad)"/>
  <circle cx="24" cy="67" r="5" fill="url(#grad)"/>
  <circle cx="24" cy="33" r="5" fill="url(#grad)"/>
  <!-- Connecting lines -->
  <line x1="50" y1="50" x2="50" y2="18"  stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="76" y2="33"  stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="76" y2="67"  stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="50" y2="82"  stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="24" y2="67"  stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="50" x2="24" y2="33"  stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
